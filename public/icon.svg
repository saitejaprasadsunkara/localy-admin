<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="localy-icon-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F97316;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#22C55E;stop-opacity:1" />
    </linearGradient>
    <filter id="icon-shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-opacity="0.2" />
    </filter>
  </defs>
  
  <!-- Background circle subtle -->
  <circle cx="50" cy="50" r="48" fill="url(#localy-icon-gradient)" opacity="0.08" />
  
  <!-- Outer ring -->
  <circle cx="50" cy="50" r="45" fill="none" stroke="url(#localy-icon-gradient)" stroke-width="1.5" opacity="0.15" />
  
  <!-- Location Pin Icon -->
  <g filter="url(#icon-shadow)">
    <!-- Main pin shape -->
    <path d="M 50 12 C 65 12 75 22 75 37 C 75 60 50 82 50 82 C 50 82 25 60 25 37 C 25 22 35 12 50 12 Z" 
          fill="url(#localy-icon-gradient)" />
    
    <!-- Inner highlight circle -->
    <circle cx="50" cy="42" r="8" fill="#ffffff" opacity="0.95" />
    
    <!-- Inner dot for depth -->
    <circle cx="50" cy="42" r="4" fill="url(#localy-icon-gradient)" opacity="0.6" />
  </g>
</svg>
